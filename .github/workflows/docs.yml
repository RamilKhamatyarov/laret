name: Deploy Documentation

on:
  push:
    branches:
      - main
  # PRs run the build job only (no deploy) so tape/docs breakage is caught
  # before it reaches main.
  pull_request:
  workflow_dispatch:

# GitHub Pages deployment requires write access to Pages and an OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; let an in-flight run finish.
# Ref-scoped so PR builds don't queue behind main deploys (deploys all share
# the refs/heads/main group).
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 25 to match jvmToolchain(25): the fat JAR is Java 25 bytecode.
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Fat JAR keeps the docs build fast; nativeCompile is unnecessary here.
      - name: Build fat JAR
        run: ./gradlew shadowJar

      # Non-strict on deploy: render whatever prose exists, falling back to the
      # DSL description for commands without a .md file.
      - name: Generate Markdown docs
        run: |
          java -jar build/libs/laret-fat.jar \
            doc generate --format md --lang all --output-dir site/docs

      - name: Generate Pages landing page
        run: |
          java -jar build/libs/laret-fat.jar \
            doc index --readme README.md --lang en --output-dir site/docs

      - name: Install VHS
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-jetbrains-mono
          sudo curl -fsSL -o /usr/local/bin/ttyd \
            https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
          sudo chmod +x /usr/local/bin/ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.10.0/vhs_0.10.0_Linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 vhs_0.10.0_Linux_x86_64/vhs
          ttyd --version
          vhs --version

      - name: Render demo GIFs
        run: |
          set -euo pipefail
          # The tapes invoke `laret`; expose the fat JAR as an executable.
          mkdir -p "$HOME/.local/bin"
          printf '#!/usr/bin/env bash\nexec java -jar "%s/build/libs/laret-fat.jar" "$@"\n' \
            "$GITHUB_WORKSPACE" > "$HOME/.local/bin/laret"
          chmod +x "$HOME/.local/bin/laret"
          export PATH="$HOME/.local/bin:$PATH"

          for tape in demo/*.tape; do
            echo "Rendering $tape"
            vhs "$tape"
          done

          mkdir -p site/docs/assets
          cp demo/*.gif site/docs/assets/
          ls -la site/docs/assets/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-static-i18n

      # Uses the committed mkdocs.yml at the repo root (docs_dir: site/docs).
      - name: Build MkDocs site
        run: mkdocs build --site-dir site-build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-build

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
