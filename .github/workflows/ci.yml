name: Build and Test Laret CLI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  statuses: write
  checks: write
  pull-requests: write
  security-events: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure Git
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Setup Gradle caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Linter
        uses: super-linter/super-linter@v8.0.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_ALL_LINTERS: false
          VALIDATE_KOTLIN: true
          DISABLE_GITHUB_STATUS_API: true
          VALIDATE_GIT_COMMIT_HISTORY: false
          HTTP_TIMEOUT: 30

      - name: KTLint with ReviewDog
        uses: ScaCap/action-ktlint@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review

      - name: Build the project
        run: ./gradlew build -x test

      - name: Run Tests
        run: ./gradlew test --info

      - name: List test results files
        if: always()
        run: find . -name "*.xml" -path "*/test-results/*" | head -20

      - name: Upload Test Results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            build/test-results/**/*.xml
          check_name: "Unit Test Results (Ubuntu Latest, JDK 24)"
          comment_mode: "always"
          report_individual_runs: true

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java -version
          native-image --version

      - name: Build Native Image
        run: ./gradlew nativeCompile

      - name: Test Bash Completion Generation
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret completion bash > /tmp/laret_bash_completion.sh 2> /tmp/laret_bash_completion.stderr.log
          if [ -s /tmp/laret_bash_completion.stderr.log ]; then
            echo "=== laret (bash completion) stderr ==="
            head -200 /tmp/laret_bash_completion.stderr.log || true
            echo "====================================="
          fi
          bash -n /tmp/laret_bash_completion.sh
          echo "Bash completion script is valid"

      - name: Test Bash Completion Sourcing
        run: |
          bash -c "source /tmp/laret_bash_completion.sh && echo 'Bash completion sourced successfully'"

      - name: Install Zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Test Zsh Completion Generation
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret completion zsh > /tmp/laret_zsh_completion.sh 2> /tmp/laret_zsh_completion.stderr.log
          if [ -s /tmp/laret_zsh_completion.stderr.log ]; then
            echo "=== laret (zsh completion) stderr ==="
            head -200 /tmp/laret_zsh_completion.stderr.log || true
            echo "====================================="
          fi
          zsh -n /tmp/laret_zsh_completion.sh
          echo "Zsh completion script is valid"

      - name: Test Zsh Completion Sourcing
        run: |
          zsh -c "source /tmp/laret_zsh_completion.sh && echo 'Zsh completion sourced successfully'"

      - name: Install PowerShell
        run: sudo apt-get install -y powershell

      - name: Test PowerShell Completion Generation
        run: |
          ./build/native/nativeCompile/laret completion powershell > /tmp/laret_ps_completion.ps1

          pwsh -NoProfile -Command "Test-Path '/tmp/laret_ps_completion.ps1'" -ErrorAction Stop
          echo "PowerShell completion script is valid"

      - name: Test PowerShell Completion Sourcing
        run: |
          pwsh -NoProfile -Command ". '/tmp/laret_ps_completion.ps1'; Write-Host 'PowerShell completion sourced successfully'"

      - name: Test CLI Commands
        run: |
          echo "Testing file operations..."
          ./build/native/nativeCompile/laret file create /tmp/test.txt -c "test content"
          ./build/native/nativeCompile/laret file read /tmp/test.txt
          ./build/native/nativeCompile/laret file read /tmp/test.txt --format json

          echo "Testing directory operations..."
          ./build/native/nativeCompile/laret dir list /tmp --long
          ./build/native/nativeCompile/laret dir list /tmp --format json | head -20
          echo "All CLI tests passed"

      - name: Test Progress Bar - file create
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret file create /tmp/laret_pb_test.txt -c "progress bar test" > /tmp/laret_pb_create.stdout.log 2> /tmp/laret_pb_create.stderr.log
          if [ -s /tmp/laret_pb_create.stderr.log ]; then
            echo "=== laret (file create) stderr ==="
            head -200 /tmp/laret_pb_create.stderr.log || true
            echo "=================================="
          fi
          grep -q "File created" /tmp/laret_pb_create.stderr.log
          echo "Progress bar spinner output is valid for file create"

      - name: Test Progress Bar - file delete
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret file delete /tmp/laret_pb_test.txt > /tmp/laret_pb_delete.stdout.log 2> /tmp/laret_pb_delete.stderr.log
          if [ -s /tmp/laret_pb_delete.stderr.log ]; then
            echo "=== laret (file delete) stderr ==="
            head -200 /tmp/laret_pb_delete.stderr.log || true
            echo "=================================="
          fi
          grep -q "File deleted" /tmp/laret_pb_delete.stderr.log
          echo "Progress bar spinner output is valid for file delete"

      - name: Test Progress Bar - dir create
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret dir create /tmp/laret_pb_testdir > /tmp/laret_pb_dircreate.stdout.log 2> /tmp/laret_pb_dircreate.stderr.log
          if [ -s /tmp/laret_pb_dircreate.stderr.log ]; then
            echo "=== laret (dir create) stderr ==="
            head -200 /tmp/laret_pb_dircreate.stderr.log || true
            echo "================================="
          fi
          grep -q "Directory created" /tmp/laret_pb_dircreate.stderr.log
          echo "Progress bar spinner output is valid for dir create"

      - name: Test Progress Bar - dir list
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret dir list /tmp > /tmp/laret_pb_dirlist.stdout.log 2> /tmp/laret_pb_dirlist.stderr.log
          
          if [ -s /tmp/laret_pb_dirlist.stderr.log ]; then
            echo "=== laret (dir list) stderr ==="
            head -200 /tmp/laret_pb_dirlist.stderr.log || true
            echo "==============================="
          fi
          grep -q "Scanning" /tmp/laret_pb_dirlist.stderr.log
          grep -q "Directory:" /tmp/laret_pb_dirlist.stdout.log
          echo "Progress bar output is valid for dir list"


      - name: Test Progress Bar - stdout is clean
        run: |
          set -euo pipefail
          ./build/native/nativeCompile/laret file create /tmp/laret_clean_test.txt -c "clean stdout" > /tmp/laret_clean.stdout.log 2>/dev/null
          if grep -qP "[\x00-\x08\x0e-\x1f]" /tmp/laret_clean.stdout.log 2>/dev/null; then
            echo "ERROR: stdout contains control characters (progress bar leaked to stdout)"
            exit 1
          fi
          echo "stdout is clean - no progress bar output leaked"

      - name: Test Interactive Prompts - text input
        run: |
          set -euo pipefail
          echo "myfilename.txt" | ./build/native/nativeCompile/laret prompt text "Enter filename" > /tmp/laret_prompt_text.stdout.log 2> /tmp/laret_prompt_text.stderr.log
          if [ -s /tmp/laret_prompt_text.stderr.log ]; then
            echo "=== laret (prompt text) stderr ==="
            head -200 /tmp/laret_prompt_text.stderr.log || true
            echo "=================================="
          fi
          grep -q "myfilename.txt" /tmp/laret_prompt_text.stdout.log
          echo "Interactive prompt text input is valid"

      - name: Test Interactive Prompts - text input with default
        run: |
          set -euo pipefail
          echo "" | ./build/native/nativeCompile/laret prompt text "Enter filename" --default "default.txt" > /tmp/laret_prompt_default.stdout.log 2> /tmp/laret_prompt_default.stderr.log
          if [ -s /tmp/laret_prompt_default.stderr.log ]; then
            echo "=== laret (prompt text default) stderr ==="
            head -200 /tmp/laret_prompt_default.stderr.log || true
            echo "=========================================="
          fi
          grep -q "default.txt" /tmp/laret_prompt_default.stdout.log
          echo "Interactive prompt default value is valid"

      - name: Test Interactive Prompts - confirm yes
        run: |
          set -euo pipefail
          printf 'y\n' | ./build/native/nativeCompile/laret prompt confirm "Are you sure" > /tmp/laret_confirm_yes.stdout.log 2> /tmp/laret_confirm_yes.stderr.log
          if [ -s /tmp/laret_confirm_yes.stderr.log ]; then
            echo "=== laret (prompt confirm yes) stderr ==="
            head -200 /tmp/laret_confirm_yes.stderr.log || true
            echo "========================================="
          fi
          grep -q "true" /tmp/laret_confirm_yes.stdout.log
          echo "Interactive prompt confirm yes is valid"

      - name: Test Interactive Prompts - confirm no
        run: |
          set -euo pipefail
          printf 'n\n' | ./build/native/nativeCompile/laret prompt confirm "Are you sure" > /tmp/laret_confirm_no.stdout.log 2> /tmp/laret_confirm_no.stderr.log
          if [ -s /tmp/laret_confirm_no.stderr.log ]; then
            echo "=== laret (prompt confirm no) stderr ==="
            head -200 /tmp/laret_confirm_no.stderr.log || true
            echo "========================================"
          fi
          grep -q "false" /tmp/laret_confirm_no.stdout.log
          echo "Interactive prompt confirm no is valid"

      - name: Test Interactive Prompts - select
        run: |
          set -euo pipefail
          printf '2\n' | ./build/native/nativeCompile/laret prompt select "Pick format" --options "json,yaml,toml" > /tmp/laret_select.stdout.log 2> /tmp/laret_select.stderr.log
          if [ -s /tmp/laret_select.stderr.log ]; then
            echo "=== laret (prompt select) stderr ==="
            head -200 /tmp/laret_select.stderr.log || true
            echo "===================================="
          fi
          grep -q "yaml" /tmp/laret_select.stdout.log
          echo "Interactive prompt select is valid"

      - name: Test Interactive Prompts - multiselect
        run: |
          set -euo pipefail
          printf '1,3\n' | ./build/native/nativeCompile/laret prompt multiselect "Pick formats" --options "json,yaml,toml" > /tmp/laret_multiselect.stdout.log 2> /tmp/laret_multiselect.stderr.log
          if [ -s /tmp/laret_multiselect.stderr.log ]; then
            echo "=== laret (prompt multiselect) stderr ==="
            head -200 /tmp/laret_multiselect.stderr.log || true
            echo "========================================="
          fi
          grep -q "json" /tmp/laret_multiselect.stdout.log
          grep -q "toml" /tmp/laret_multiselect.stdout.log
          echo "Interactive prompt multiselect is valid"

      - name: Test Interactive Prompts - stdout is clean
        run: |
          set -euo pipefail
          printf 'testvalue\n' | ./build/native/nativeCompile/laret prompt text "Enter value" > /tmp/laret_prompt_clean.stdout.log 2>/dev/null
          if grep -qP "[\x00-\x08\x0e-\x1f]" /tmp/laret_prompt_clean.stdout.log 2>/dev/null; then
            echo "ERROR: stdout contains control characters from interactive prompts"
            exit 1
          fi
          echo "Interactive prompt stdout is clean"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: laret-cli
          path: |
            build/native/nativeCompile/laret
            build/libs/laret-fat.jar
          retention-days: 7
