name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        default: false
        description: 'Publish a GitHub Release instead of only validating artifacts'
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release Versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          GRADLE_VERSION=$(grep '^version = ' build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          WIZARD_VERSION=$(grep 'DEFAULT_LARET_VERSION' \
            src/main/kotlin/com/rkhamatyarov/laret/scaffold/wizard/InteractiveWizard.kt \
            | grep -o '"[^"]*"' | tr -d '"')
          MAIN_VERSION=$(grep -m1 'version = "' \
            src/main/kotlin/com/rkhamatyarov/laret/example/Main.kt \
            | grep -o '"[^"]*"' | tr -d '"')

          echo "Gradle version : $GRADLE_VERSION"
          echo "Wizard version : $WIZARD_VERSION"
          echo "Main version   : $MAIN_VERSION"

          if [[ "$GRADLE_VERSION" != "$WIZARD_VERSION" ]]; then
            echo "Version mismatch between build.gradle.kts ($GRADLE_VERSION) and InteractiveWizard ($WIZARD_VERSION)"
            exit 1
          fi

          if [[ "$GRADLE_VERSION" != "$MAIN_VERSION" ]]; then
            echo "Version mismatch between build.gradle.kts ($GRADLE_VERSION) and example/Main.kt ($MAIN_VERSION)"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "Tag version    : $TAG_VERSION"
            if [[ "$GRADLE_VERSION" != "$TAG_VERSION" ]]; then
              echo "Tag v$TAG_VERSION does not match build.gradle.kts version $GRADLE_VERSION"
              echo "Run: ./scripts/bump-version.sh $TAG_VERSION"
              exit 1
            fi
          fi

          echo "All versions consistent: $GRADLE_VERSION"

  build-native:
    name: Build Native - ${{ matrix.target }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact-name: laret-linux-x86_64
            binary-name: laret-linux-x86_64
            os: ubuntu-latest
            target: linux-x86_64
          - artifact-name: laret-macos-aarch64
            binary-name: laret-macos-aarch64
            os: macos-14
            target: macos-aarch64
          - artifact-name: laret-windows-x86_64
            binary-name: laret-windows-x86_64.exe
            os: windows-latest
            target: windows-x86_64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          java-version: '25'
          native-image-job-reports: 'true'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build native image
        if: runner.os != 'Windows'
        run: |
          chmod +x ./gradlew
          ./gradlew nativeCompile --no-daemon --console=plain

      - name: Build native image on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat nativeCompile --no-daemon --console=plain

      - name: Prepare release artifact
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp build/native/nativeCompile/laret "release/${{ matrix.binary-name }}"
          chmod +x "release/${{ matrix.binary-name }}"

      - name: Prepare Windows release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item build\native\nativeCompile\laret.exe "release\${{ matrix.binary-name }}"

      - name: Upload platform binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: ${{ matrix.artifact-name }}
          path: release/${{ matrix.binary-name }}
          retention-days: 1

      - name: Upload native build report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: native-report-${{ matrix.target }}
          path: build/native/nativeCompile/reports/**
          retention-days: 7

  generate-checksums:
    name: Generate SHA256 Checksums
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - name: Download platform binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release
          pattern: laret-*

      - name: Create release metadata
        run: |
          tag_name="${GITHUB_REF_NAME:-manual-release}"
          printf '{\n  "x-laret-version": "%s",\n  "commit": "%s"\n}\n' \
            "$tag_name" "$GITHUB_SHA" > release/laret-release-metadata.json

      - name: Compute SHA256 checksums
        run: |
          cd release
          sha256sum laret-* | sort -k2 > SHA256SUMS.txt
          grep -Eq '^[a-f0-9]{64}  laret-' SHA256SUMS.txt
          sha256sum --check SHA256SUMS.txt

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: release-bundle
          path: release/*
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' || github.event.inputs.publish == 'true'
    needs:
      - build-native
      - generate-checksums
    runs-on: ubuntu-latest

    steps:
      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: release/*
          generate_release_notes: true
          body: |
            ## Laret ${{ github.ref_name }}

            ### New Features
            - `laret new project` — interactive wizard to scaffold a new Laret CLI project
            - `laret doc generate --format <md|man> --lang <en|es|all>` — documentation generation with i18n prose support
            - `laret doc` group: Clean Architecture doc subsystem (`DocGenerator`, `ProseProvider`, `ResourceProseProvider`)

            ### Improvements
            - GraalVM native-image resource config updated for scaffold templates and doc prose files
            - `GroffDocGenerator` adapter wraps existing `ManPageGenerator` without breaking `completion man`

            ### Migration
            - Man pages: `laret completion man` continues to work unchanged. The new `laret doc generate --format man` path is the recommended future default.
            - Prose files: drop `src/main/resources/docs/{lang}/{group}/{command}.md` files alongside your commands to add localized long descriptions, examples, and see-also references.

            See full changelog below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-release-test:
    name: Smoke Test - ${{ matrix.target }}
    if: github.event_name == 'push'
    needs: publish-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: laret-linux-x86_64
            binary: laret
            target: linux-x86_64
          - os: macos-14
            asset: laret-macos-aarch64
            binary: laret
            target: macos-aarch64
          - os: windows-latest
            asset: laret-windows-x86_64.exe
            binary: laret.exe
            target: windows-x86_64

    steps:
      - name: Download release binary
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          curl -fsSL -o "${{ matrix.binary }}" \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${{ matrix.asset }}"

      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ./${{ matrix.binary }}

      - name: Smoke test — version
        shell: bash
        run: ./${{ matrix.binary }} --version

      - name: Smoke test — doc generate
        shell: bash
        run: ./${{ matrix.binary }} doc generate --format md --lang en --output-dir smoke-docs

      - name: Smoke test — completion help
        shell: bash
        run: ./${{ matrix.binary }} completion --help || true
