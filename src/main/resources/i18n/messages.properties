# English messages
# Format: messages_<lang>.properties with {0}, {1}, ... placeholders.

# Generic
app.greeting=Hello from Laret!
app.initializing=Laret initializing...
app.shutting.down=Laret shutting down...

# File operations
file.created=File created: {0}
file.deleted=File deleted: {0}
file.not.found=Error: File not found: {0}
file.already.exists=Error: File already exists: {0} (use --force to overwrite)
file.create.failed=Failed to create file: {0}
file.delete.failed=Failed to delete file: {0}

# Directory operations
dir.listed=Directory: {0}
dir.created=Directory created: {0}
dir.not.a.directory=Error: Not a directory: {0}
dir.list.entries=listed {0} entries in {1}

# Pipeline
pipe.started=Pipeline running {0} stage(s)
pipe.stage.n=--- stage {0} of {1}: {2} ---
pipe.empty=Error: pipeline is empty

# Watch
watch.started=Watching {0} (recursive={1}, duration={2}s, max-events={3})
watch.stopped=Watch stopped: {0} event(s) emitted, reason={1}
watch.not.a.directory=Error: Not a directory: {0}
watch.path.required=Error: watch run requires a directory path

# Stats
stats.format.unknown=Error: unknown stats format: {0} (expected prometheus, json, plain)
stats.reset.done=Stats have been reset

# Diff
diff.file.not.found=Error: file not found: {0}
diff.format.unknown=Error: unknown diff format: {0} (expected unified, plain, json)

# Locale
locale.set.done=Locale set to: {0}
locale.reset.done=Locale reset to: {0}
locale.invalid.tag=Error: invalid locale tag ''{0}'' (expected e.g. es, en_US, fr_FR)
locale.env.override.warning=Warning: LARET_LOCALE={0} overrides the persisted locale. Unset it for locale set to take effect across sessions.
